# models.yaml — THE model catalog. One file, every menu.
#
# Ingested at BUILD time: embedded into the server AND the desk (src/worker/modelcfg.zig parses it), so
# the chat Settings dropdowns, the Swarm deploy form, the Tasks model override, and the server's own
# provider logic (keyless deploys, local-model detection, default models) all read THIS list. Edit here,
# rebuild, and every menu updates together. The desk's "default (your chat model)" options in Deploy and
# Tasks are unaffected — they inherit whatever the user picked in Settings, which itself comes from here.
#
# FORMAT (a deliberate YAML subset the in-tree parser understands — keep to it):
#   - two-space indentation, exactly as below; full-line comments (#) and blank lines are fine
#   - scalar values may be bare or "double-quoted" (quote anything with a leading @ or a colon)
#   - booleans are the words true / false
#
# ORDER MATTERS: the desk persists dropdown selections as INDICES into this list. Append new providers
# at the END; never reorder or remove without a settings-key migration.
#
# Per-provider flags:
#   needs_key      the UI requires an API key field
#   needs_account  the base URL carries an {account} placeholder (Cloudflare Workers AI)
#   keyless        the SERVER accepts a deploy without a key (local endpoints / server-side creds)
#   local          the provider runs on the user's machine (no internet egress)

defaults:
  local_model: gpt-oss:20b
  cf_model: "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

providers:
  - key: anthropic
    label: Anthropic (Claude)
    base: https://api.anthropic.com/v1
    needs_key: true
    models:
      - id: claude-opus-4-8
        label: Claude Opus 4.8
      - id: claude-fable-5
        label: Claude Fable 5
      - id: claude-sonnet-5
        label: Claude Sonnet 5
      - id: claude-haiku-4-5
        label: Claude Haiku 4.5

  - key: openai
    label: OpenAI (GPT)
    base: https://api.openai.com/v1
    needs_key: true
    models:
      - id: gpt-5
        label: GPT-5
      - id: gpt-4.1
        label: GPT-4.1
      - id: gpt-4.1-mini
        label: GPT-4.1 mini
      - id: gpt-4.1-nano
        label: GPT-4.1 nano
      - id: o4-mini
        label: o4-mini

  - key: ollama
    label: Ollama (local - no key)
    base: http://localhost:11434/v1
    needs_key: false
    keyless: true
    local: true
    models:
      - id: gpt-oss:20b
        label: gpt-oss 20B
      - id: qwen2.5-coder:7b
        label: Qwen2.5 Coder 7B
      - id: qwen2.5:14b
        label: Qwen2.5 14B
      - id: llama3.1:8b
        label: Llama 3.1 8B
      - id: hermes3:8b
        label: Hermes 3 8B

  # Cloudflare Workers AI via its OpenAI-compatible endpoint. Needs BOTH an account id (in the URL) and a
  # token; blank sends the "cloudflare" sentinel so a server configured with NL_CF_ACCOUNT_ID +
  # NL_WORKERS_AI_TOKEN uses its own included credentials (that server-side fallback is why keyless=true).
  - key: workers-ai
    label: Cloudflare Workers AI
    base: https://api.cloudflare.com/client/v4/accounts/{account}/ai/v1
    needs_key: true
    needs_account: true
    keyless: true
    models:
      - id: "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
        label: Llama 3.3 70B (fast)
      - id: "@cf/meta/llama-3.1-8b-instruct"
        label: Llama 3.1 8B
      - id: "@cf/qwen/qwen2.5-coder-32b-instruct"
        label: Qwen2.5 Coder 32B

  - key: groq
    label: Groq
    base: https://api.groq.com/openai/v1
    needs_key: true
    models:
      - id: llama-3.3-70b-versatile
        label: Llama 3.3 70B versatile

  - key: deepseek
    label: DeepSeek
    base: https://api.deepseek.com/v1
    needs_key: true
    models:
      - id: deepseek-v4-flash
        label: DeepSeek V4 Flash
      - id: deepseek-v4-pro
        label: DeepSeek V4 Pro
      - id: deepseek-chat
        label: DeepSeek Chat

  - key: google
    label: Google Gemini
    base: https://generativelanguage.googleapis.com/v1beta/openai
    needs_key: true
    models:
      - id: gemini-3.5-flash
        label: Gemini 3.5 Flash
      - id: gemini-3.1-pro-preview
        label: Gemini 3.1 Pro (preview)
      - id: gemini-2.5-flash
        label: Gemini 2.5 Flash

  - key: mock
    label: Mock (dry run - no calls)
    base: ""
    needs_key: false
    keyless: true
    local: true
    models:
      - id: mock
        label: mock

  # Hugging Face Inference Providers — one hf_ token routes to hundreds of open models across partner
  # providers. OpenAI-compatible, so it flows through the standard BYOK path. A model id may carry a
  # ":provider"/":cheapest" suffix to pin routing.
  - key: huggingface
    label: Hugging Face (Inference Providers)
    base: https://router.huggingface.co/v1
    needs_key: true
    models:
      - id: openai/gpt-oss-120b
        label: GPT-OSS 120B
      - id: openai/gpt-oss-20b
        label: GPT-OSS 20B
      - id: deepseek-ai/DeepSeek-V3-0324
        label: DeepSeek V3
      - id: deepseek-ai/DeepSeek-R1
        label: DeepSeek R1
      - id: meta-llama/Llama-3.3-70B-Instruct
        label: Llama 3.3 70B
      - id: meta-llama/Llama-3.1-8B-Instruct
        label: Llama 3.1 8B
      - id: Qwen/Qwen2.5-72B-Instruct
        label: Qwen2.5 72B
      - id: Qwen/Qwen2.5-Coder-32B-Instruct
        label: Qwen2.5 Coder 32B
      - id: mistralai/Mistral-Small-24B-Instruct-2501
        label: Mistral Small 24B

  # Z.AI (Zhipu) GLM family — OpenAI-compatible chat/completions at /api/paas/v4, Bearer-auth. Flows through
  # the standard BYOK path (like DeepSeek/Groq); glm-4.5-flash is the free tier. Docs: https://docs.z.ai
  - key: zai
    label: Z.AI (GLM)
    base: https://api.z.ai/api/paas/v4
    needs_key: true
    models:
      - id: glm-5.2
        label: GLM-5.2
      - id: glm-4.6
        label: GLM-4.6
      - id: glm-4.5
        label: GLM-4.5
      - id: glm-4.5-air
        label: GLM-4.5 Air
      - id: glm-4.5-flash
        label: GLM-4.5 Flash (free)

  # TokenGO (API host: api.thorbase.com) — OpenAI-compatible aggregator running discounted self-operated
  # inference for Moonshot / Z.AI / DeepSeek / Qwen / MiniMax. Bearer auth; model ids are vendor/model slugs.
  # $5 free test credits on signup. Docs: https://tokengo.com/docs
  - key: tokengo
    label: TokenGO
    base: https://api.thorbase.com/v1
    needs_key: true
    models:
      - id: z-ai/glm-5.2
        label: GLM 5.2
      - id: moonshotai/kimi-k2.6
        label: Kimi K2.6
      - id: deepseek/deepseek-v4-pro
        label: DeepSeek V4 Pro
      - id: deepseek/deepseek-v4-flash
        label: DeepSeek V4 Flash
      - id: qwen/qwen3.5-397b-a17b
        label: Qwen3.5 397B A17B
      - id: minimax/minimax-m2.5
        label: MiniMax M2.5
      - id: z-ai/glm-5.1
        label: GLM 5.1
      - id: z-ai/glm-5
        label: GLM 5
      - id: deepseek/deepseek-v3.2
        label: DeepSeek V3.2
      - id: deepseek/deepseek-v3.1
        label: DeepSeek V3.1
