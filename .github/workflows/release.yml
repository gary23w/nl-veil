name: release

# On main pushes: a fast build check (the badge signal). On a version tag or a
# manual run: full, self-contained bundles built natively per-OS — the only
# reliable way to ship veil-desk (raylib) and neuron (Rust) for every platform.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # fast signal on every main push: does the server still build?
  check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # v2 resolves releases through ziglang.org's download index; the old @v1 hand-built the
      # pre-0.16 tarball name (zig-linux-x86_64-…) and 404'd on every mirror after 0.16.0
      # switched to arch-first naming (zig-x86_64-linux-…). This is what broke every main-push check.
      - uses: mlugg/setup-zig@v2
        with: { version: 0.16.0 }
      # GUI deps first: scripts/check.sh --full ends with the DEFAULT build (raylib merged into `veil`),
      # which needs GL/X11 present. Every gate before it is server-side and never links raylib.
      - name: Linux desktop deps (raylib GL/X11/wayland)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev
      # ONE definition of done. These gates used to be re-spelled in YAML, which let CI and the local
      # oracle drift apart silently — exactly what scripts/check.sh and scripts/check.ps1 exist to
      # prevent. --full runs everything the YAML did, in the same spirit: the model-catalog sync check
      # (models.yaml is embedded at comptime and mirrored into web/public/models.json for the browser;
      # the two drifted badly once), the server-only build, the full server suite via src/tests.zig,
      # the desk suite, and the default GUI build that actually ships.
      #
      # Local equivalents: `sh scripts/check.sh --full`, or on Windows `.\scripts\check.ps1 -Full`.
      - name: acceptance gates (scripts/check.sh --full)
        run: sh scripts/check.sh --full

  # full bundles: only on a tag or a manual dispatch
  bundle:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each runner contributes the FULL native bundle for its own OS — the only way to ship veil-desk
          # (raylib links the platform GUI stack) and neuron (Rust) per platform. `xc: yes` additionally
          # cross-compiles the standalone SERVER for every target; one runner doing that is enough.
          - { os: windows-latest, name: windows-x86_64, xc: 'no'  }
          - { os: ubuntu-latest,  name: linux-x86_64,   xc: 'yes' }
          - { os: macos-14,       name: macos-arm64,    xc: 'no'  }
          - { os: macos-13,       name: macos-x86_64,   xc: 'no'  }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout nl-veil
        uses: actions/checkout@v4

      - name: Checkout neuron-db (the memory engine)
        uses: actions/checkout@v4
        with:
          repository: gary23w/neuron-db
          # MUST live under $GITHUB_WORKSPACE — actions/checkout rejects a path that escapes it
          # ("is not under"), which is exactly how the first v1.0.0-alpha.1 run died in 7s.
          path: neuron-db

      - name: Linux desktop deps (raylib GL/X11/wayland)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev

      - name: Install Zig 0.16
        uses: mlugg/setup-zig@v2
        with: { version: 0.16.0 }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the neuron memory engine
        working-directory: neuron-db/rust/neuron-core
        run: cargo build --release --features "sqlite secure server trust"

      # ONE script on every runner (bash is present on the windows runner too). The runner already installed
      # zig/rust/raylib above, so skip the script's own bootstrap.
      - name: Build bundle
        shell: bash
        env:
          NO_BOOTSTRAP: '1'
        run: |
          EXT=""
          [ "$RUNNER_OS" = "Windows" ] && EXT=".exe"
          export NEURON="$GITHUB_WORKSPACE/neuron-db/rust/neuron-core/target/release/neuron$EXT"
          if [ "${{ matrix.xc }}" = "yes" ]; then
            sh scripts/build-official.sh
          else
            sh scripts/build-official.sh --host-only
          fi
          # per-runner name so the uploads can't clobber one another's checksum file
          [ -f bin/SHA256SUMS.txt ] && mv bin/SHA256SUMS.txt "bin/SHA256SUMS-${{ matrix.name }}.txt"
          ls -la bin/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: veil-${{ matrix.name }}
          path: |
            bin/*.zip
            bin/*.tar.gz
            bin/server-only/veil-server-v*
            bin/SHA256SUMS-*.txt

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Bump this to the current release's notes on every tag (one notes file per release under docs/release/).
          body_path: docs/release/RELEASE-v1.0.0-alpha.3.md
          # ALPHA: ships a known default admin password (changeme) and the web UI is not yet at desk parity.
          # Pre-release keeps it out of "Latest release" until v1.0.0 proper.
          prerelease: true
          files: |
            bin/*.zip
            bin/*.tar.gz
            bin/server-only/veil-server-v*
            bin/SHA256SUMS-*.txt
